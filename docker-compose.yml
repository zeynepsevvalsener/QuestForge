services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-questforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-questforge}
      POSTGRES_DB: ${POSTGRES_DB:-questforge}
    ports:
      - "5432:5432"
    volumes:
      - questforge_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-questforge}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-questforge}:${POSTGRES_PASSWORD:-questforge}@postgres:5432/${POSTGRES_DB:-questforge}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"

volumes:
  questforge_pgdata:
