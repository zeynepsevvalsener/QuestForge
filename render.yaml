# Render blueprint: a Dockerized FastAPI backend + managed Postgres.
# Deploy by connecting this repo in the Render dashboard ("New > Blueprint").
services:
  - type: web
    name: questforge-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: questforge-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: questforge-db
    plan: free
